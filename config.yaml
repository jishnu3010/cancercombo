model:
  d_model: 256
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  molformer_in_dim: 768
  morgan_in_dim: 2048
  descriptor_in_dim: 200
  cell_in_dim: 20000
  use_pathway_projection: true
  n_pathways: 300
  molformer_model_name: "ibm/MoLFormer-XL-CIMA-100M"
  use_pretrained_molformer: true
  enable_drug_drug_attention: false
  use_symmetric_fusion: true
  e_min: 0.0
  e_max: 100.0
  c_min: 1.0e-6
  c_max: 1.0e3
  h_min: 0.1
  h_max: 10.0
  alpha_min: 1.0e-4
  alpha_max: 100.0

training:
  batch_size: 128
  epochs: 100
  optimizer_name: "AdamW"
  scheduler_name: "ReduceLROnPlateau"
  scheduler_factor: 0.5
  scheduler_patience: 3
  lr: 1.0e-4
  weight_decay: 1.0e-5
  device: "cuda"
  checkpoint_dir: "checkpoints"
  save_top_k: 3
  num_workers: 0
  seed: 42
